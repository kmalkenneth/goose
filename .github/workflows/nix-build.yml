name: Nix Build & Cache

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build flake
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=github:nixos/nixpkgs/nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: goose-fork
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build
        run: |
          nix build .# --print-build-logs
          nix build .#duck-cli --print-build-logs
