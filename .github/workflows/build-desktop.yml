name: Build Duck Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=github:nixos/nixpkgs/nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: goose-fork
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build CLI binary
        run: nix build .# --print-build-logs

      - name: Copy binary to desktop
        run: |
          mkdir -p ui/desktop/src/bin
          cp result/bin/goose ui/desktop/src/bin/goose
          cp result/bin/duck ui/desktop/src/bin/duck
          chmod +x ui/desktop/src/bin/goose ui/desktop/src/bin/duck

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install system deps for desktop building
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            rpm \
            fakeroot \
            dpkg-dev \
            libasound2t64

      - name: Install dependencies
        run: cd ui/desktop && pnpm install --frozen-lockfile

      - name: Package app
        run: cd ui/desktop && npx electron-forge package

      - name: Make .deb
        run: cd ui/desktop && pnpm run make -- --platform=linux --arch=x64

      - name: Find .deb
        id: find-deb
        run: |
          DEB=$(find ui/desktop/out/make/deb -name '*.deb' | head -1)
          echo "deb_path=$DEB" >> $GITHUB_OUTPUT
          echo "Found: $DEB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duck-desktop-deb
          path: ui/desktop/out/make/deb/**/*.deb

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-deb.outputs.deb_path }}
